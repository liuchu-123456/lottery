<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 龙虾周周MVP福利抽奖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    font-family: 'Microsoft YaHei', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    overflow-x: hidden;
  }

  /* 飘落粒子 */
  .confetti {
    position: fixed; top: -10px; pointer-events: none; z-index: 999;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  h1 {
    color: #FFD700;
    font-size: 2.2rem;
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    letter-spacing: 4px;
  }
  .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 2px; }

  /* 奖品展示区 */
  .prizes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 900px;
    margin-bottom: 30px;
  }

  .prize-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
    transition: all 0.3s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .prize-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,215,0,0.05));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .prize-card:hover::before { opacity: 1; }
  .prize-card:hover { transform: translateY(-4px); border-color: rgba(255,215,0,0.4); }

  .prize-card.won {
    background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.15));
    border-color: #FFD700;
    box-shadow: 0 0 20px rgba(255,215,0,0.4);
    animation: prizePulse 0.5s ease;
  }
  .prize-card.exhausted { opacity: 0.35; filter: grayscale(0.8); }

  @keyframes prizePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .prize-emoji { font-size: 2.2rem; display: block; margin-bottom: 8px; }
  .prize-name { color: #fff; font-size: 0.85rem; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
  .prize-count {
    display: inline-block;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.3);
    color: #FFD700;
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: 20px;
  }
  .prize-count.zero { background: rgba(100,100,100,0.2); border-color: #555; color: #777; }

  /* 抽奖中心区 */
  .lottery-center {
    width: 100%;
    max-width: 520px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 30px;
    text-align: center;
    margin-bottom: 24px;
  }

  .wheel-display {
    width: 180px; height: 180px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: conic-gradient(
      #e74c3c 0% 14.3%,
      #e67e22 14.3% 28.6%,
      #f1c40f 28.6% 42.9%,
      #2ecc71 42.9% 57.2%,
      #3498db 57.2% 71.5%,
      #9b59b6 71.5% 85.7%,
      #1abc9c 85.7% 100%
    );
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 0 40px rgba(255,215,0,0.25);
    transition: transform 0.05s;
  }
  .wheel-display.spinning {
    animation: spinWheel 0.4s linear infinite;
  }
  @keyframes spinWheel {
    to { transform: rotate(360deg); }
  }
  .wheel-center {
    width: 60px; height: 60px;
    background: #1a1a2e;
    border-radius: 50%;
    border: 3px solid #FFD700;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    z-index: 2;
    position: relative;
  }

  /* 结果展示 */
  .result-box {
    min-height: 70px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .result-text {
    color: #fff;
    font-size: 1.1rem;
    opacity: 0.5;
  }
  .result-prize {
    text-align: center;
    animation: resultIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes resultIn {
    from { opacity: 0; transform: scale(0.5) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .result-prize .big-emoji { font-size: 3rem; display: block; }
  .result-prize .big-name { color: #FFD700; font-size: 1.4rem; font-weight: 700; margin-top: 6px; }
  .result-prize .winner-name { color: #aaa; font-size: 0.9rem; margin-top: 4px; }

  /* 名字输入 */
  .name-input-wrap {
    display: flex; gap: 10px; margin-bottom: 16px;
    align-items: center; flex-wrap: wrap; justify-content: center;
  }
  .name-input {
    flex: 1; min-width: 180px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 10px 16px;
    color: #fff; font-size: 1rem;
    outline: none; transition: border-color 0.2s;
  }
  .name-input:focus { border-color: #FFD700; }
  .name-input::placeholder { color: #666; }

  /* 按钮 */
  .btn {
    padding: 12px 28px;
    border-radius: 12px;
    border: none; cursor: pointer;
    font-size: 1rem; font-weight: 700;
    transition: all 0.2s; letter-spacing: 1px;
  }
  .btn-draw {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #1a1a2e;
    box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    font-size: 1.1rem; padding: 14px 40px;
    width: 100%;
  }
  .btn-draw:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255,215,0,0.6); }
  .btn-draw:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-small {
    background: rgba(255,255,255,0.1);
    color: #aaa; font-size: 0.8rem; padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-small:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-reset {
    background: rgba(220, 50, 50, 0.15);
    color: #ff8080; border: 1px solid rgba(220,50,50,0.3);
  }
  .btn-reset:hover { background: rgba(220,50,50,0.25); }

  /* 历史记录 */
  .history {
    width: 100%; max-width: 520px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px;
  }
  .history h3 { color: #FFD700; font-size: 1rem; margin-bottom: 14px; letter-spacing: 2px; }
  .history-list { list-style: none; max-height: 240px; overflow-y: auto; }
  .history-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 0.88rem; color: #ccc;
    gap: 10px;
  }
  .history-list li:last-child { border-bottom: none; }
  .history-list .h-num { color: #555; min-width: 24px; }
  .history-list .h-name { color: #fff; font-weight: 600; }
  .history-list .h-prize { color: #FFD700; text-align: right; flex: 1; }
  .history-list .h-emoji { font-size: 1.1rem; }
  .empty-history { color: #555; font-size: 0.85rem; text-align: center; padding: 16px 0; }

  .controls-row {
    display: flex; gap: 10px; margin-top: 16px; justify-content: center; flex-wrap: wrap;
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(255,215,0,0.9); color: #1a1a2e;
    padding: 10px 24px; border-radius: 30px;
    font-weight: 700; font-size: 0.95rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    z-index: 1000;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>🦞 龙虾周周MVP福利抽奖</h1>
<p class="subtitle">周周优秀 · 好礼相送 · 恭喜获奖~</p>

<!-- 奖品展示 -->
<div class="prizes-grid" id="prizesGrid"></div>

<!-- 抽奖中心 -->
<div class="lottery-center">
  <div class="wheel-display" id="wheel">
    <div class="wheel-center">🎁</div>
  </div>

  <div class="result-box" id="resultBox">
    <div class="result-text">输入姓名，点击抽奖</div>
  </div>

  <div class="name-input-wrap">
    <input class="name-input" id="nameInput" type="text" placeholder="请输入参与者姓名" maxlength="20">
  </div>

  <button class="btn btn-draw" id="drawBtn" onclick="draw()">🎰 开始抽奖</button>
</div>

<!-- 中奖记录 -->
<div class="history">
  <h3>🏆 中奖记录</h3>
  <ul class="history-list" id="historyList">
    <li class="empty-history" id="emptyHint">暂无记录</li>
  </ul>
  <div class="controls-row">
    <button class="btn btn-small" onclick="exportHistory()">📋 导出记录</button>
    <button class="btn btn-small btn-reset" onclick="resetAll()">🔄 重置抽奖</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ────── 奖品配置 ──────
const PRIZES_CONFIG = [
  { id: 1, emoji: '🎬', name: '双人电影通兑票', total: 2, color: '#e74c3c' },
  { id: 2, emoji: '🦞', name: '鲜活波士顿龙虾(500g)', total: 1, color: '#e67e22' },
  { id: 3, emoji: '🦐', name: '捞汁海鲜桶', total: 1, color: '#f39c12' },
  { id: 4, emoji: '🍗', name: '肯德基超级全家桶', total: 1, color: '#27ae60' },
  { id: 5, emoji: '🌶️', name: '大份熟食小龙虾', total: 1, color: '#e74c3c' },
  { id: 6, emoji: '☕', name: '咖啡券', total: 7, color: '#8e44ad' },
  { id: 7, emoji: '🧋', name: '奶茶券', total: 7, color: '#3498db' },
];

// ────── 状态 ──────
let prizes = JSON.parse(localStorage.getItem('lottery_prizes') || 'null')
  || PRIZES_CONFIG.map(p => ({ ...p, remaining: p.total }));
let history = JSON.parse(localStorage.getItem('lottery_history') || '[]');
let isSpinning = false;

// ────── 初始化 ──────
function init() {
  renderPrizes();
  renderHistory();
}

function renderPrizes() {
  const grid = document.getElementById('prizesGrid');
  grid.innerHTML = '';
  prizes.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prize-card' + (p.remaining === 0 ? ' exhausted' : '');
    card.id = 'prize-' + p.id;
    card.innerHTML = `
      <span class="prize-emoji">${p.emoji}</span>
      <div class="prize-name">${p.name}</div>
      <span class="prize-count ${p.remaining === 0 ? 'zero' : ''}">
        ${p.remaining === 0 ? '已抽完' : '剩余 ' + p.remaining + ' 个'}
      </span>
    `;
    grid.appendChild(card);
  });
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('emptyHint');
  if (history.length === 0) {
    list.innerHTML = '<li class="empty-history" id="emptyHint">暂无记录</li>';
    return;
  }
  list.innerHTML = history.slice().reverse().map((h, i) => `
    <li>
      <span class="h-num">#${history.length - i}</span>
      <span class="h-name">${h.name}</span>
      <span class="h-prize">${h.prizeEmoji} ${h.prizeName}</span>
    </li>
  `).join('');
}

// ────── 抽奖逻辑 ──────
function getAvailablePrizes() {
  return prizes.filter(p => p.remaining > 0);
}

function draw() {
  if (isSpinning) return;
  const available = getAvailablePrizes();
  if (available.length === 0) {
    showToast('所有奖品已抽完！');
    return;
  }

  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    document.getElementById('nameInput').focus();
    showToast('请先输入参与者姓名 👆');
    return;
  }

  isSpinning = true;
  document.getElementById('drawBtn').disabled = true;
  document.getElementById('resultBox').innerHTML = '<div class="result-text">🎰 抽奖中...</div>';

  // 转盘动画
  const wheel = document.getElementById('wheel');
  wheel.classList.add('spinning');
  const center = wheel.querySelector('.wheel-center');
  center.textContent = '🎰';

  // 随机时长 2-3.5s
  const duration = 2000 + Math.random() * 1500;

  setTimeout(() => {
    // 加权随机（剩余多的概率大）
    const total = available.reduce((s, p) => s + p.remaining, 0);
    let rand = Math.random() * total;
    let winner = available[available.length - 1];
    for (const p of available) {
      rand -= p.remaining;
      if (rand <= 0) { winner = p; break; }
    }

    // 更新状态
    const prizeObj = prizes.find(p => p.id === winner.id);
    prizeObj.remaining--;

    // 记录
    const record = {
      name,
      prizeName: winner.name,
      prizeEmoji: winner.emoji,
      time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
    };
    history.push(record);
    saveState();

    // 停止动画
    wheel.classList.remove('spinning');
    center.textContent = winner.emoji;

    // 显示结果
    document.getElementById('resultBox').innerHTML = `
      <div class="result-prize">
        <span class="big-emoji">${winner.emoji}</span>
        <div class="big-name">${winner.name}</div>
        <div class="winner-name">🎉 恭喜 ${name} ！</div>
      </div>
    `;

    // 高亮奖品卡
    const card = document.getElementById('prize-' + winner.id);
    card.classList.add('won');
    setTimeout(() => {
      card.classList.remove('won');
      renderPrizes();
    }, 1500);

    renderHistory();
    launchConfetti();

    // 清空姓名
    document.getElementById('nameInput').value = '';

    isSpinning = false;
    document.getElementById('drawBtn').disabled = false;
  }, duration);
}

// ────── 彩色纸屑 ──────
function launchConfetti() {
  const colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.5 + Math.random() * 2}s;
        animation-delay: 0s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 30);
  }
}

// ────── 工具 ──────
function saveState() {
  localStorage.setItem('lottery_prizes', JSON.stringify(prizes));
  localStorage.setItem('lottery_history', JSON.stringify(history));
}

function resetAll() {
  if (!confirm('确认重置抽奖？所有奖品和记录将清空！')) return;
  prizes = PRIZES_CONFIG.map(p => ({ ...p, remaining: p.total }));
  history = [];
  localStorage.removeItem('lottery_prizes');
  localStorage.removeItem('lottery_history');
  document.getElementById('resultBox').innerHTML = '<div class="result-text">输入姓名，点击抽奖</div>';
  document.getElementById('wheel').querySelector('.wheel-center').textContent = '🎁';
  renderPrizes();
  renderHistory();
  showToast('已重置，重新开始！');
}

function exportHistory() {
  if (history.length === 0) { showToast('暂无记录可导出'); return; }
  const lines = ['序号,姓名,奖品,时间', ...history.map((h, i) =>
    `${i+1},${h.name},${h.prizeName},${h.time}`)];
  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '抽奖记录_' + new Date().toLocaleDateString('zh-CN').replace(/\//g,'-') + '.csv';
  a.click();
  showToast('导出成功！');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 回车抽奖
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') draw();
});

init();
</script>
</body>
</html>
