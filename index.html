<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>рҹҰһ йҫҷиҷҫе‘Ёе‘ЁMVPзҰҸеҲ©жҠҪеҘ–</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background: radial-gradient(ellipse at top, #1a1a2e 0%, #0d0d1a 100%);
  font-family:'Microsoft YaHei',sans-serif;
  display:flex; flex-direction:column; align-items:center;
  padding:24px 16px 40px; overflow-x:hidden;
}
.stars {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 82% 55%, rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 78%, rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 8%  68%, rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 38%, rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 90%, rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 28% 50%, rgba(255,255,255,.2) 0%,transparent 100%);
}
.confetti { position:fixed; top:-10px; pointer-events:none; z-index:999; animation:fall linear forwards; }
@keyframes fall { to { transform:translateY(110vh) rotate(720deg); opacity:0; } }

h1 {
  position:relative; z-index:1;
  color:#FFD700; font-size:1.75rem; text-align:center;
  margin-bottom:4px;
  text-shadow:0 0 30px rgba(255,215,0,.7), 0 2px 4px rgba(0,0,0,.5);
  letter-spacing:3px;
}
.subtitle {
  position:relative; z-index:1;
  color:rgba(255,215,0,.55); font-size:.82rem;
  margin-bottom:20px; letter-spacing:4px;
}

/* жЁЎејҸеҲҮжҚў */
.mode-tabs {
  position:relative; z-index:1;
  display:flex; gap:10px; margin-bottom:24px;
}
.mode-tab {
  padding:9px 24px; border-radius:20px;
  border:1.5px solid rgba(255,215,0,.25);
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.5); font-size:.9rem; font-weight:600;
  cursor:pointer; transition:all .2s; letter-spacing:1px;
}
.mode-tab.active {
  background:linear-gradient(135deg,#FFD700,#FFA500);
  color:#1a1a2e; border-color:transparent;
  box-shadow:0 4px 16px rgba(255,215,0,.4);
}

/* иҫ“е…ҘеҢә */
.input-area {
  position:relative; z-index:1;
  width:100%; max-width:380px;
  display:flex; gap:10px; margin-bottom:20px;
}
.name-input {
  flex:1; background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,215,0,.3); border-radius:12px;
  padding:12px 18px; color:#fff; font-size:1rem;
  outline:none; transition:border-color .2s;
}
.name-input:focus { border-color:#FFD700; background:rgba(255,255,255,.12); }
.name-input::placeholder { color:rgba(255,255,255,.3); }
.btn-draw {
  background:linear-gradient(135deg,#FFD700,#FFA500);
  color:#1a1a2e; border:none; border-radius:12px;
  padding:12px 22px; font-size:1rem; font-weight:700;
  cursor:pointer; white-space:nowrap;
  box-shadow:0 4px 16px rgba(255,215,0,.4); transition:all .2s;
}
.btn-draw:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 24px rgba(255,215,0,.6); }
.btn-draw:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* в•җв•җв•җв•җ иҪ¬зӣҳжЁЎејҸ в•җв•җв•җв•җ */
#wheelMode { display:flex; flex-direction:column; align-items:center; position:relative; z-index:1; width:100%; }
.pointer { width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:28px solid #FFD700; filter:drop-shadow(0 2px 8px rgba(255,215,0,.8)); margin-bottom:-4px; z-index:10; position:relative; }
.wheel-canvas-wrap { position:relative; width:320px; height:320px; }
canvas#wheelCanvas { border-radius:50%; box-shadow:0 0 40px rgba(255,215,0,.3),0 0 80px rgba(255,165,0,.15); display:block; }
.wheel-center-btn {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:64px; height:64px; border-radius:50%;
  background:linear-gradient(135deg,#FFD700,#FFA500);
  border:4px solid #fff; box-shadow:0 0 20px rgba(255,215,0,.6),0 4px 12px rgba(0,0,0,.4);
  cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center;
  transition:all .2s; z-index:5; color:#1a1a2e; font-weight:900; letter-spacing:0;
}
.wheel-center-btn:hover:not(:disabled) { transform:translate(-50%,-50%) scale(1.08); box-shadow:0 0 30px rgba(255,215,0,.9); }
.wheel-center-btn:disabled { opacity:.6; cursor:not-allowed; transform:translate(-50%,-50%); }

/* еҘ–е“Ғйў„и§Ҳ */
.prize-legend {
  width:100%; max-width:360px; margin-top:20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px; padding:14px 16px;
}
.prize-legend h4 { color:rgba(255,215,0,.6); font-size:.78rem; letter-spacing:2px; margin-bottom:10px; }
.prize-legend-list { list-style:none; }
.prize-legend-list li {
  display:flex; align-items:center; gap:8px;
  padding:5px 0; border-bottom:1px solid rgba(255,255,255,.04);
  font-size:.82rem;
}
.prize-legend-list li:last-child { border-bottom:none; }
.pl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.pl-name { color:rgba(255,255,255,.8); flex:1; }
.pl-sub { color:rgba(255,255,255,.35); font-size:.75rem; }
.pl-remain { color:rgba(255,215,0,.5); font-size:.75rem; margin-left:4px; }

/* в•җв•җв•җв•җ жҗ“жҗ“д№җжЁЎејҸ в•җв•җв•җв•җ */
#scratchMode { display:none; flex-direction:column; align-items:center; position:relative; z-index:1; width:100%; }
.scratch-cards-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:12px; width:100%; max-width:380px; margin-bottom:16px;
}
.scratch-card-wrap { position:relative; aspect-ratio:1; cursor:pointer; }
.scratch-card-back {
  position:absolute; inset:0; border-radius:14px;
  background:linear-gradient(135deg,#2c3e6a,#1a2a50);
  border:1.5px solid rgba(255,215,0,.2);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:2rem; color:rgba(255,255,255,.15);
  transition:all .3s;
  user-select:none;
}
.scratch-card-back:hover { border-color:rgba(255,215,0,.5); background:linear-gradient(135deg,#34487a,#223060); }
.scratch-card-front {
  position:absolute; inset:0; border-radius:14px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:8px; text-align:center;
  opacity:0; transform:scale(.8); transition:all .4s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
.scratch-card-front.revealed { opacity:1; transform:scale(1); pointer-events:none; }
.scratch-card-front .sc-emoji { font-size:2rem; }
.scratch-card-front .sc-name { color:#FFD700; font-size:.7rem; font-weight:700; line-height:1.3; }
.scratch-card-wrap.done .scratch-card-back { opacity:0; pointer-events:none; }
.scratch-hint { color:rgba(255,255,255,.3); font-size:.82rem; letter-spacing:1px; margin-bottom:8px; }
.btn-new-cards {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.6); border-radius:10px; padding:9px 22px;
  font-size:.85rem; cursor:pointer; transition:all .2s; margin-top:8px;
}
.btn-new-cards:hover { background:rgba(255,255,255,.14); color:#fff; }

/* еҺҶеҸІи®°еҪ• */
.history {
  position:relative; z-index:1;
  width:100%; max-width:380px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px; padding:16px 18px; margin-top:20px;
}
.history-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.history h3 { color:#FFD700; font-size:.88rem; letter-spacing:2px; }
.btn-reset { background:none; border:1px solid rgba(255,80,80,.3); color:rgba(255,100,100,.7); border-radius:8px; padding:4px 12px; font-size:.72rem; cursor:pointer; transition:all .2s; }
.btn-reset:hover { border-color:#ff6060; color:#ff6060; }
.history-list { list-style:none; max-height:180px; overflow-y:auto; }
.history-list li { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:.82rem; }
.history-list li:last-child { border-bottom:none; }
.h-num { color:#444; min-width:20px; font-size:.72rem; }
.h-name { color:#fff; font-weight:600; flex:1; }
.h-prize { color:#FFD700; font-size:.78rem; text-align:right; }
.empty-history { color:#444; font-size:.8rem; text-align:center; padding:10px 0; }

/* еј№зӘ— */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
.modal-overlay.show { display:flex; }
.modal { background:linear-gradient(135deg,#1e1e3a,#16213e); border:2px solid rgba(255,215,0,.4); border-radius:24px; padding:36px 32px; text-align:center; max-width:340px; width:90%; box-shadow:0 0 60px rgba(255,215,0,.2); animation:modalIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes modalIn { from{opacity:0;transform:scale(.6) translateY(30px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-emoji { font-size:3.8rem; display:block; margin-bottom:10px; }
.modal-title { color:rgba(255,215,0,.6); font-size:.82rem; letter-spacing:2px; margin-bottom:6px; }
.modal-prize { color:#FFD700; font-size:1.5rem; font-weight:700; margin-bottom:6px; line-height:1.3; }
.modal-sub { color:rgba(255,255,255,.45); font-size:.82rem; margin-bottom:10px; }
.modal-winner { color:rgba(255,255,255,.7); font-size:.95rem; margin-bottom:16px; }
.modal-winner span { color:#fff; font-weight:700; }
.modal-tip { color:rgba(255,255,255,.35); font-size:.75rem; margin-bottom:24px; border-top:1px solid rgba(255,255,255,.08); padding-top:12px; letter-spacing:1px; }
.modal-tip strong { color:rgba(255,215,0,.65); }
.btn-close { background:linear-gradient(135deg,#FFD700,#FFA500); color:#1a1a2e; border:none; border-radius:12px; padding:11px 38px; font-size:.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
.btn-close:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(255,215,0,.5); }

.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:rgba(255,215,0,.95); color:#1a1a2e; padding:10px 22px; border-radius:30px; font-weight:700; font-size:.88rem; opacity:0; pointer-events:none; transition:opacity .3s; z-index:1000; }
.toast.show { opacity:1; }
</style>
</head>
<body>
<div class="stars"></div>

<h1>рҹҰһ йҫҷиҷҫе‘Ёе‘ЁMVPзҰҸеҲ©жҠҪеҘ–</h1>
<p class="subtitle">иҷҫзҺӢеҠ еҶ•гғ»иҚЈиӘүеҲ°жүӢгғ»е®һеҠӣи®ӨиҜҒ</p>

<!-- жЁЎејҸеҲҮжҚў -->
<div class="mode-tabs">
  <div class="mode-tab active" id="tabWheel" onclick="switchMode('wheel')">рҹҺЎ еӨ§иҪ¬зӣҳ</div>
  <div class="mode-tab" id="tabScratch" onclick="switchMode('scratch')">рҹҺҙ жҗ“жҗ“д№җ</div>
</div>

<!-- иҫ“е…Ҙе§“еҗҚ -->
<div class="input-area">
  <input class="name-input" id="nameInput" type="text" placeholder="вңҸпёҸ иҫ“е…ҘиҺ·еҘ–иҖ…е§“еҗҚ" maxlength="20">
  <button class="btn-draw" id="drawBtn" onclick="onDraw()">жҠҪеҘ–</button>
</div>

<!-- иҪ¬зӣҳжЁЎејҸ -->
<div id="wheelMode">
  <div class="pointer"></div>
  <div class="wheel-canvas-wrap">
    <canvas id="wheelCanvas" width="320" height="320"></canvas>
    <button class="wheel-center-btn" id="centerBtn" onclick="onDraw()">GO!</button>
  </div>
  <!-- еҘ–е“Ғйў„и§Ҳ -->
  <div class="prize-legend">
    <h4>рҹҺҒ еҘ–е“ҒдёҖи§Ҳ</h4>
    <ul class="prize-legend-list" id="prizeLegend"></ul>
  </div>
</div>

<!-- жҗ“жҗ“д№җжЁЎејҸ -->
<div id="scratchMode">
  <p class="scratch-hint">рҹ‘Ҷ зӮ№еҮ»еҚЎзүҮпјҢзҝ»ејҖдҪ зҡ„иҝҗж°”</p>
  <div class="scratch-cards-grid" id="scratchGrid"></div>
  <button class="btn-new-cards" onclick="buildScratchCards()">рҹ”Җ жҚўдёҖжү№еҚЎзүҮ</button>
</div>

<!-- еҺҶеҸІи®°еҪ• -->
<div class="history">
  <div class="history-header">
    <h3>рҹҸҶ дёӯеҘ–и®°еҪ•</h3>
    <button class="btn-reset" onclick="resetAll()">йҮҚзҪ®</button>
  </div>
  <ul class="history-list" id="historyList"><li class="empty-history">жҡӮж— и®°еҪ•</li></ul>
</div>

<!-- еј№зӘ— -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <span class="modal-emoji" id="mEmoji"></span>
    <div class="modal-title">рҹҺү жҒӯе–ңиҺ·еҫ—</div>
    <div class="modal-prize" id="mPrize"></div>
    <div class="modal-sub" id="mSub"></div>
    <div class="modal-winner" id="mWinner"></div>
    <div class="modal-tip">рҹ“Ң иҜ·еңЁ 7 еӨ©еҶ…жүҫ <strong>йқ’й»ӣ</strong> е…‘жҚўеҘ–е“Ғ</div>
    <button class="btn-close" onclick="closeModal()">рҹҺү еӨӘжЈ’дәҶпјҒ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// в”Җв”Җ еҘ–е“Ғй…ҚзҪ® в”Җв”Җ
const PRIZES = [
  { id:1, emoji:'рҹҺ¬', name:'е…үеҪұеҮәйҖғ',   sub:'еҸҢдәәз”өеҪұйҖҡе…‘зҘЁ 2 еј ',  total:2, color:'#c0392b' },
  { id:2, emoji:'рҹҢ¶пёҸ', name:'иҷҫи¶ЈзӢӮе—Ё',  sub:'еӨ§д»ҪзҶҹйЈҹе°Ҹйҫҷиҷҫ 1 д»Ҫ',  total:1, color:'#e74c3c' },
  { id:3, emoji:'вҳ•', name:'дёғж—ҘйҶ’зҘһ',   sub:'дёғж—Ҙе’–е•ЎеҲё 1 д»Ҫ',       total:7, color:'#8e44ad' },
  { id:4, emoji:'рҹ§Ӣ', name:'з”ңйҘ®з»ӯе‘Ҫ',   sub:'дёғж—ҘеҘ¶иҢ¶еҲё 1 д»Ҫ',       total:7, color:'#2980b9' },
  { id:5, emoji:'рҹҚ—', name:'зӢӮзӮ«зӣӣе®ҙ',   sub:'иӮҜеҫ·еҹәи¶…зә§е…Ёе®¶жЎ¶ 1 д»Ҫ', total:1, color:'#e67e22' },
  { id:6, emoji:'рҹҰҗ', name:'жө·жҚһзӢӮеҗғ',   sub:'жҚһжұҒжө·йІңжЎ¶ 1 д»Ҫ',       total:1, color:'#16a085' },
  { id:7, emoji:'рҹҰһ', name:'е·ЁиҷҫйЎ¶й…Қ',   sub:'жіўеЈ«йЎҝйҫҷиҷҫ 1 д»Ҫ(500g)', total:1, color:'#f39c12' },
];

let prizes = JSON.parse(localStorage.getItem('lp2_prizes')||'null') || PRIZES.map(p=>({...p,remaining:p.total}));
let history = JSON.parse(localStorage.getItem('lp2_history')||'[]');
let isSpinning = false;
let currentAngle = 0;
let currentMode = 'wheel';

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const R = 160;

// в”Җв”Җ е·Ҙе…· в”Җв”Җ
function getAvailable() { return prizes.filter(p=>p.remaining>0); }
function saveState() { localStorage.setItem('lp2_prizes',JSON.stringify(prizes)); localStorage.setItem('lp2_history',JSON.stringify(history)); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function checkName() {
  const n=document.getElementById('nameInput').value.trim();
  if(!n){ document.getElementById('nameInput').focus(); showToast('иҜ·е…Ҳиҫ“е…ҘиҺ·еҘ–иҖ…е§“еҗҚ рҹ‘Ҷ'); return null; }
  return n;
}

// в”Җв”Җ жЁЎејҸеҲҮжҚў в”Җв”Җ
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('wheelMode').style.display = mode==='wheel'?'flex':'none';
  document.getElementById('scratchMode').style.display = mode==='scratch'?'flex':'none';
  document.getElementById('tabWheel').className = 'mode-tab'+(mode==='wheel'?' active':'');
  document.getElementById('tabScratch').className = 'mode-tab'+(mode==='scratch'?' active':'');
  if(mode==='scratch') buildScratchCards();
}

// в”Җв”Җ дё»жҠҪеҘ–е…ҘеҸЈ в”Җв”Җ
function onDraw() {
  if(currentMode==='wheel') startSpin();
}

// в”Җв”Җ еҠ жқғйҡҸжңә в”Җв”Җ
function pickPrize() {
  const av = getAvailable();
  if(!av.length) return null;
  const total = av.reduce((s,p)=>s+p.remaining,0);
  let r = Math.random()*total;
  for(const p of av){ r-=p.remaining; if(r<=0) return p; }
  return av[av.length-1];
}

// в”Җв”Җ иҪ¬зӣҳз»ҳеҲ¶ в”Җв”Җ
function drawWheel(rotateAngle=0) {
  ctx.clearRect(0,0,320,320);
  const av = getAvailable();
  if(!av.length) {
    ctx.fillStyle='rgba(255,255,255,.06)'; ctx.beginPath(); ctx.arc(R,R,R-2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#666'; ctx.font='bold 15px Microsoft YaHei'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('еҘ–е“Ғе·Іе…ЁйғЁжҠҪе®Ң',R,R); return;
  }
  const total = av.length;
  let start = rotateAngle;
  av.forEach((p,i)=>{
    const slice=(1/total)*Math.PI*2;
    const end=start+slice, mid=start+slice/2;
    ctx.beginPath(); ctx.moveTo(R,R); ctx.arc(R,R,R-2,start,end); ctx.closePath();
    ctx.fillStyle=p.color; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1.5; ctx.stroke();
    // emoji
    ctx.save(); ctx.translate(R,R); ctx.rotate(mid);
    ctx.font=`${av.length>5?22:26}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.emoji, R*0.58, 0); ctx.restore();
    start=end;
  });
  // еӨ–еңҲ
  ctx.beginPath(); ctx.arc(R,R,R-2,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,215,0,.5)'; ctx.lineWidth=4; ctx.stroke();
  // дёӯеҝғ
  ctx.beginPath(); ctx.arc(R,R,36,0,Math.PI*2);
  ctx.fillStyle='#0d0d1a'; ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,.3)'; ctx.lineWidth=2; ctx.stroke();
}

// в”Җв”Җ еҘ–е“Ғйў„и§Ҳ в”Җв”Җ
function renderPrizeLegend() {
  const ul = document.getElementById('prizeLegend');
  ul.innerHTML = prizes.map(p=>`
    <li>
      <span class="pl-dot" style="background:${p.color}"></span>
      <span class="pl-name">${p.emoji} ${p.name}</span>
      <span class="pl-sub">${p.sub}</span>
      <span class="pl-remain">${p.remaining>0?'Г—'+p.remaining:'вң“'}</span>
    </li>
  `).join('');
}

// в”Җв”Җ иҪ¬зӣҳж—ӢиҪ¬ в”Җв”Җ
function startSpin() {
  if(isSpinning) return;
  const av=getAvailable();
  if(!av.length){ showToast('жүҖжңүеҘ–е“Ғе·ІжҠҪе®ҢпјҒ'); return; }
  const name=checkName(); if(!name) return;

  isSpinning=true;
  document.getElementById('drawBtn').disabled=true;
  document.getElementById('centerBtn').disabled=true;
  document.getElementById('centerBtn').textContent='...';

  const winner=pickPrize();
  const totalR=av.length;
  let offset=0;
  for(const p of av){ if(p.id===winner.id) break; offset+=(1/totalR)*Math.PI*2; }
  const sliceMid=offset+(1/totalR)*Math.PI*2/2;
  const targetAngle=5*Math.PI*2+(Math.PI*1.5-sliceMid)%(Math.PI*2);

  const duration=3500, startTime=performance.now(), startAngle=currentAngle;
  function ease(t){ return 1-Math.pow(1-t,4); }
  function animate(now){
    const p=Math.min((now-startTime)/duration,1);
    currentAngle=startAngle+targetAngle*ease(p);
    drawWheel(currentAngle);
    if(p<1){ requestAnimationFrame(animate); return; }
    // е®ҢжҲҗ
    prizes.find(p=>p.id===winner.id).remaining--;
    history.push({name,prizeName:winner.name,prizeEmoji:winner.emoji,prizeSub:winner.sub});
    saveState(); renderPrizeLegend(); renderHistory(); drawWheel(currentAngle);
    setTimeout(()=>showModal(winner,name),300);
    isSpinning=false;
    document.getElementById('drawBtn').disabled=false;
    document.getElementById('centerBtn').disabled=false;
    document.getElementById('centerBtn').textContent='GO!';
    document.getElementById('nameInput').value='';
  }
  requestAnimationFrame(animate);
}

// в”Җв”Җ жҗ“жҗ“д№җ в”Җв”Җ
const CARD_BG_EMOJIS = ['рҹҢҹ','вңЁ','рҹ’«','рҹҺҠ','рҹҺү','рҹ”®','рҹҢҲ','рҹҺҒ','рҹҚҖ','вӯҗ'];

function buildScratchCards() {
  const av=getAvailable();
  if(!av.length){ showToast('жүҖжңүеҘ–е“Ғе·ІжҠҪе®ҢпјҒ'); return; }
  const grid=document.getElementById('scratchGrid');
  grid.innerHTML='';
  // з”ҹжҲҗ9еј пјҢйҡҸжңәеҲҶй…ҚпјҲеҗ«зңҹе®һеҘ–е“Ғпјү
  const total=av.reduce((s,p)=>s+p.remaining,0);
  for(let i=0;i<9;i++){
    // йҡҸжңәеҠ жқғеҸ–дёҖдёӘеҘ–е“ҒпјҲдёҚеҮҸж•°йҮҸпјҢзӮ№еҮ»жүҚз®—пјү
    let r=Math.random()*total, prize=av[av.length-1];
    for(const p of av){ r-=p.remaining; if(r<=0){ prize=p; break; } }

    const wrap=document.createElement('div');
    wrap.className='scratch-card-wrap';
    wrap.dataset.prizeId=prize.id;
    wrap.innerHTML=`
      <div class="scratch-card-back">${CARD_BG_EMOJIS[Math.floor(Math.random()*CARD_BG_EMOJIS.length)]}</div>
      <div class="scratch-card-front" style="background:linear-gradient(135deg,${prize.color}33,${prize.color}22);border:1.5px solid ${prize.color}66;">
        <span class="sc-emoji">${prize.emoji}</span>
        <span class="sc-name">${prize.name}</span>
      </div>
    `;
    wrap.addEventListener('click',()=>onScratchCard(wrap,prize));
    grid.appendChild(wrap);
  }
}

function onScratchCard(wrap,prize) {
  if(wrap.classList.contains('done')) return;
  const av=getAvailable(); if(!av.length){ showToast('жүҖжңүеҘ–е“Ғе·ІжҠҪе®ҢпјҒ'); return; }
  const name=checkName(); if(!name) return;

  // жүҫеҪ“еүҚеҸҜз”Ёзҡ„еҜ№еә”еҘ–е“ҒпјҲеҸҜиғҪе·ІжҠҪе®ҢпјҢйҮҚж–°йҖүпјү
  let actual=prizes.find(p=>p.id===prize.id && p.remaining>0);
  if(!actual) actual=pickPrize();
  if(!actual){ showToast('жүҖжңүеҘ–е“Ғе·ІжҠҪе®ҢпјҒ'); return; }

  actual.remaining--;
  history.push({name,prizeName:actual.name,prizeEmoji:actual.emoji,prizeSub:actual.sub});
  saveState(); renderHistory();

  // жӣҙж–°еҚЎзүҮжҳҫзӨә
  const front=wrap.querySelector('.scratch-card-front');
  front.innerHTML=`<span class="sc-emoji">${actual.emoji}</span><span class="sc-name">${actual.name}</span>`;
  front.style.background=`linear-gradient(135deg,${actual.color}44,${actual.color}22)`;
  front.style.border=`1.5px solid ${actual.color}88`;
  wrap.classList.add('done');
  front.classList.add('revealed');

  document.getElementById('nameInput').value='';
  setTimeout(()=>showModal(actual,name),400);
  launchConfetti();
}

// в”Җв”Җ еј№зӘ— в”Җв”Җ
function showModal(prize,name) {
  document.getElementById('mEmoji').textContent=prize.emoji;
  document.getElementById('mPrize').textContent=prize.name;
  document.getElementById('mSub').textContent=prize.sub;
  document.getElementById('mWinner').innerHTML=`рҹҺү жҒӯе–ң <span>${name}</span> иҺ·еҫ—жӯӨеҘ–пјҒ`;
  document.getElementById('modalOverlay').classList.add('show');
  launchConfetti();
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });

// в”Җв”Җ еҺҶеҸІ в”Җв”Җ
function renderHistory() {
  const list=document.getElementById('historyList');
  if(!history.length){ list.innerHTML='<li class="empty-history">жҡӮж— и®°еҪ•</li>'; return; }
  list.innerHTML=history.slice().reverse().map((h,i)=>`
    <li>
      <span class="h-num">#${history.length-i}</span>
      <span class="h-name">${h.name}</span>
      <span class="h-prize">${h.prizeEmoji} ${h.prizeName}</span>
    </li>
  `).join('');
}

function resetAll() {
  if(!confirm('зЎ®и®ӨйҮҚзҪ®пјҹжүҖжңүеҘ–е“Ғе’Ңи®°еҪ•е°Ҷжё…з©әпјҒ')) return;
  prizes=PRIZES.map(p=>({...p,remaining:p.total}));
  history=[]; currentAngle=0;
  localStorage.removeItem('lp2_prizes'); localStorage.removeItem('lp2_history');
  drawWheel(0); renderPrizeLegend(); renderHistory();
  if(currentMode==='scratch') buildScratchCards();
  showToast('е·ІйҮҚзҪ®пјҒ');
}

// в”Җв”Җ еҪ©еұ‘ в”Җв”Җ
function launchConfetti() {
  const colors=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#FFEAA7','#DDA0DD','#96CEB4'];
  for(let i=0;i<80;i++) setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti';
    el.style.cssText=`left:${Math.random()*100}vw;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),3500);
  },i*25);
}

// еӣһиҪҰи§ҰеҸ‘
document.getElementById('nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') onDraw(); });

// еҲқе§ӢеҢ–
drawWheel(0); renderPrizeLegend(); renderHistory();
</script>
